/* ── Phone formatter ────────────────────────────────────── */
function formatPhone(raw) {
  const digits = raw.replace(/\D/g, '');
  // Убираем ведущую 7 или 8
  const d = (digits[0] === '7' || digits[0] === '8') ? digits.slice(1) : digits;
  let r = '';
  if (d.length === 0) return '';
  r = '+7 (';
  r += d.slice(0, 3);
  if (d.length >= 4) r += ') ' + d.slice(3, 6);
  if (d.length >= 7) r += '-' + d.slice(6, 8);
  if (d.length >= 9) r += '-' + d.slice(8, 10);
  return r;
}

/* ── Lead Form ──────────────────────────────────────────── */
function LeadForm() {
  const [form, setForm]           = useState({ name: '', phone: '', city: '' });

  const [loading, setLoading]     = useState(false);
  const [submitted, setSubmit]    = useState(false);
  const [submitError, setSubmitError] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Введите имя';
    const phoneDigits = form.phone.replace(/\D/g, '');
    const localDigits = (phoneDigits[0] === '7' || phoneDigits[0] === '8') ? phoneDigits.slice(1) : phoneDigits;
    if (localDigits.length < 10) e.phone = 'Введите корректный номер телефона';
    if (!form.city.trim()) e.city = 'Введите город';
    return e;
  };

  const onSubmit = async ev => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setLoading(true);
    setSubmitError(false);
    // Отправляем в фоне — no-cors не даёт читать ответ, ждать нет смысла
    const body = new URLSearchParams({ name: form.name, phone: form.phone, city: form.city, source: 'Место работы' });

              Подберём вакансию<br />под ваши условия

            {/* Call card */}

                 style={{ color: '#9999aa', letterSpacing: '0.15em' }}>Позвонить напрямую</p>

                 className="flex items-center gap-3 font-bold text-xl mb-1 transition-opacity hover:opacity-70"
                 style={{ color: '#241b30' }}>
                <div className="w-10 h-10 flex items-center justify-center flex-shrink-0"
                     style={{ background: '#241b30', borderRadius: '3px', color: '#c0cf1f' }}>
                  <PhoneIcon size={17} />
                </div>
                {PHONE}
              </a>
              <p className="text-xs ml-14" style={{ color: '#9999aa' }}>Бесплатно · Пн–Пт, 9:00–18:00</p>

              <div className="mt-4 pt-4" style={{ borderTop: '1px solid #e8e8ec' }}>
                <p className="text-xs mb-1" style={{ color: '#9999aa' }}>Контактный центр</p>
                <a href={HOTLINE_HREF}
                   className="text-sm font-bold transition-opacity hover:opacity-70"
                   style={{ color: '#241b30' }}>
                  {HOTLINE}
                </a>
              </div>
            </div>
          </div>

          {/* Right — form */}
          <div>
            {!submitted ? (
              <form onSubmit={onSubmit}
                    className="bg-white p-8 shadow-card"
                    style={{ borderRadius: '3px', border: '1px solid #e8e8ec' }}>
                <div className="space-y-4">
                  {/* Имя */}
                  <div>
                    <label className="block text-xs font-bold uppercase tracking-widest mb-1.5"
                           style={{ color: '#241b30', letterSpacing: '0.12em' }}>Имя</label>
                    <input
                      type="text"
                      value={form.name}
                      onChange={e => { setForm(prev => ({ ...prev, name: e.target.value })); setErrors(prev => ({ ...prev, name: '' })); }}
                      placeholder="Как вас зовут?"
                      className="w-full px-4 py-3.5 text-sm bg-white transition-colors duration-150"
                      style={{ borderRadius: '3px', border: errors.name ? '1.5px solid #e55' : '1.5px solid #e8e8ec', color: '#241b30', outline: 'none' }}

                  {/* Телефон */}

                      className="w-full px-4 py-3.5 text-sm bg-white transition-colors duration-150"
                      style={{ borderRadius: '3px', border: errors.city ? '1.5px solid #e55' : '1.5px solid #e8e8ec', color: '#241b30', outline: 'none' }}

                <p className="text-sm leading-relaxed mb-7" style={{ color: '#6b6b7b' }}>
                  Свяжемся с вами в течение 30 минут.<br />

/* ── Sticky mobile bar ──────────────────────────────────── */
function StickyBar() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const fn = () => setShow(window.scrollY > 220);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  if (!show) return null;
  return (
    <div className="fixed bottom-0 left-0 right-0 z-40 sm:hidden px-4 py-3 flex gap-2"
         style={{ background: '#241b30', borderTop: '1px solid rgba(255,255,255,0.1)' }}>
      <a href="#form"
         className="btn-accent flex-1 flex items-center justify-center py-3 font-bold text-sm">
        Найти работу
      </a>
      <a href={PHONE_HREF}
         className="flex-1 flex items-center justify-center gap-1.5 py-3 font-semibold text-sm"
         style={{ background: 'rgba(192,207,31,0.12)', borderRadius: '30px', color: '#c0cf1f', border: '1.5px solid rgba(192,207,31,0.3)' }}>
        <PhoneIcon size={14} />
        Позвонить
      </a>
    </div>
  );
}
